<!DOCTYPE html>
<html>
<head>
<title>Customer</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<div class="p-5">

<h1
id="welcome"
class="text-2xl font-bold"
>
Loading...
</h1>

</div>


<script type="module">

import {
getCurrentUser
} from './js/auth.js';

const user = await getCurrentUser();

if(!user){
    location.href='login.html';
}

document.getElementById('welcome')
.innerText =
`Halo ${user.email}`;

</script>

</body>
</html>
