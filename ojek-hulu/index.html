<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ojek Hulu Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(() => console.log('PWA Registered'));
        }
    </script>
    <style>
        body { background-color: #f3f4f6; }
        .app-container { max-width: 450px; margin: 0 auto; min-height: 100vh; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #9ca3af; transition: 0.3s; }
        .nav-btn.active { color: #16a34a; }
    </style>
</head>
<body>

    <main id="app-container" class="app-container pb-24 px-4 pt-6">
        
        <!-- Panel Login -->
        <div id="panel-login" class="hidden py-10">
            <h2 class="font-bold text-2xl mb-6">Login Driver</h2>
            <input id="email-d" type="email" placeholder="Email" class="w-full p-4 bg-gray-100 rounded-2xl border mb-3">
            <input id="pass-d" type="password" placeholder="Password" class="w-full p-4 bg-gray-100 rounded-2xl border mb-6">
            <button id="btn-login" class="w-full py-4 bg-black text-white rounded-2xl font-bold">Masuk Sekarang</button>
        </div>

        <!-- Panel Penumpang -->
        <div id="panel-p" class="space-y-6">
            <h1 class="text-2xl font-black text-green-700">Ojek Hulu</h1>
            <form id="form-pesan" class="space-y-4">
                <input id="in-nama" placeholder="Nama Anda" class="w-full p-4 bg-gray-100 rounded-2xl border" required>
                <div id="map" class="h-64 w-full rounded-3xl border overflow-hidden shadow-inner"></div>
                <button class="w-full py-4 bg-green-600 text-white rounded-2xl font-bold shadow-lg shadow-green-200">Pesan Sekarang</button>
            </form>
            <div id="panel-history" class="hidden">
                <h3 class="font-bold text-lg mb-4">Riwayat Perjalanan</h3>
                <div id="list-riwayat" class="space-y-2"></div>
            </div>
        </div>

        <!-- Panel Driver -->
        <div id="panel-d" class="hidden space-y-4">
            <h2 class="font-bold text-xl pt-4">Orderan Masuk</h2>
            <div id="list-order" class="space-y-4"></div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full max-w-[450px] left-1/2 -translate-x-1/2 bg-white border-t border-gray-100 p-4 flex justify-around z-50">
        <button id="nav-home" class="nav-btn active">
            <span class="text-xl">🏠</span><span class="text-[10px] font-bold">Beranda</span>
        </button>
        <button id="nav-history" class="nav-btn">
            <span class="text-xl">🕒</span><span class="text-[10px] font-bold">Riwayat</span>
        </button>
        <button id="nav-driver" class="nav-btn">
            <span class="text-xl">🛵</span><span class="text-[10px] font-bold">Driver</span>
        </button>
    </nav>

    <script type="module" src="js/main.js"></script>
</body>
</html>
