<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Ojek Hulu</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-md mx-auto min-h-screen flex items-center p-5">

<form id="login-form" class="bg-white w-full p-6 rounded-2xl shadow">

<h1 class="text-2xl font-bold mb-6">
Login Ojek Hulu
</h1>

<input
id="email"
type="email"
class="w-full border p-3 rounded-xl mb-3"
placeholder="Email"
required
>

<input
id="password"
type="password"
class="w-full border p-3 rounded-xl mb-4"
placeholder="Password"
required
>

<button
class="w-full bg-green-600 text-white py-3 rounded-xl font-bold"
>
Login
</button>

</form>

</div>

<script type="module">

import {
loginUser
} from './js/auth.js';

document
.getElementById('login-form')
.addEventListener('submit', async(e)=>{

e.preventDefault();

alert('TOMBOL LOGIN DIKLIK');

const result = await loginUser(
document.getElementById('email').value,
document.getElementById('password').value
);

alert(JSON.stringify(result,null,2));

if(result.error){
alert(result.error.message);
return;
}

alert('LOGIN BERHASIL');

window.location.href = './customer.html';

});

</script>

</body>
</html>
