<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ojek Hulu Putussibau</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans pb-20">
  <div class="max-w-xl mx-auto">
    <div class="flex gap-2 p-4 bg-white shadow-sm sticky top-0 z-50">
      <button id="btn-nav-pelanggan" class="flex-1 py-2 bg-green-600 text-white rounded-xl font-bold">Penumpang</button>
      <button id="btn-nav-driver" class="flex-1 py-2 bg-slate-200 rounded-xl font-bold">Driver</button>
    </div>

    <div id="panel-penumpang" class="p-4 space-y-4">
      <form id="form-pesan" class="bg-white p-4 rounded-2xl border shadow-sm space-y-3">
        <h3 class="font-bold text-sm">Pesan Sekarang</h3>
        <input id="in-nama" placeholder="Nama" class="w-full bg-slate-100 p-3 rounded-xl text-sm" required>
        <input id="in-hp" placeholder="No HP" class="w-full bg-slate-100 p-3 rounded-xl text-sm" required>
        <input id="in-jemput" placeholder="Jemput" class="w-full bg-slate-100 p-3 rounded-xl text-sm" required>
        <input id="in-tujuan" placeholder="Tujuan" class="w-full bg-slate-100 p-3 rounded-xl text-sm" required>
        <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Pesan</button>
      </form>
      <div id="list-riwayat" class="space-y-3"></div>
    </div>

    <div id="panel-driver" class="hidden p-4">
      <h2 class="font-bold text-lg mb-4">Order Masuk</h2>
      <div id="list-order-driver" class="space-y-3"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient("https://mrycbenqqpltlovtzgod.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeWNiZW5xcXBsdGxvdnR6Z29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzAxMTEsImV4cCI6MjA5NzgwNjExMX0.7wEMU_SioH4sGgBxfS8mPeweKjPwxWGC4gR6N7DQXmU");

    // Navigasi
    document.getElementById('btn-nav-pelanggan').addEventListener('click', () => {
      document.getElementById('panel-penumpang').classList.remove('hidden');
      document.getElementById('panel-driver').classList.add('hidden');
    });

    document.getElementById('btn-nav-driver').addEventListener('click', () => {
      document.getElementById('panel-penumpang').classList.add('hidden');
      document.getElementById('panel-driver').classList.remove('hidden');
      loadOrderDriver();
    });

    // Form Pesan
    document.getElementById('form-pesan').addEventListener('submit', async (e) => {
      e.preventDefault();
      await supabase.from('orders').insert([{
        nama: document.getElementById('in-nama').value,
        hp: document.getElementById('in-hp').value,
        jemput: document.getElementById('in-jemput').value,
        tujuan: document.getElementById('in-tujuan').value,
        status: 'baru'
      }]);
      alert('Pesanan dikirim!');
    });

    // Fungsi Driver
    async function loadOrderDriver() {
      const { data } = await supabase.from('orders').select('*').eq('status', 'baru');
      const container = document.getElementById('list-order-driver');
      container.innerHTML = (data || []).map(o => `
        <div class="bg-white p-4 rounded-xl border">
          <p class="font-bold">${o.nama}</p>
          <p class="text-sm">${o.jemput} ➔ ${o.tujuan}</p>
          <button onclick="handleAmbil('${o.id}')" class="w-full bg-green-600 text-white py-2 mt-2 rounded-lg">Ambil</button>
        </div>
      `).join('');
    }

    // Fungsi Global untuk Tombol Dinamis
    window.handleAmbil = async (id) => {
      await supabase.from('orders').update({ status: 'diambil' }).eq('id', id);
      loadOrderDriver();
      alert('Order diambil!');
    };
  </script>
</body>
</html>
