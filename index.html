    async function renderDriverOrders() {
      const { data } = await supabase.from('orders').select('*').eq('status', 'baru').order('created_at', { ascending: false });
      const drvPanel = $('#drv-panel-order');
      if (drvPanel && data) {
        drvPanel.innerHTML = data.map(o => `
          <div class="bg-white p-4 rounded-2xl border shadow-sm">
            <div class="font-bold text-lg">${o.nama}</div>
            <div class="text-sm text-slate-600 mb-2">${o.jemput} ➔ ${o.tujuan}</div>
            <button onclick="handleUpdate('${o.id}', 'diambil')" class="w-full bg-green-600 text-white py-2 rounded-xl font-bold">Ambil Order</button>
          </div>
        `).join('') || '<p class="text-center text-slate-400">Tidak ada pesanan masuk.</p>';
      }
    }

   // Tambahkan fungsi untuk memuat riwayat berdasarkan HP
async function loadRiwayat() {
  const hpInput = $('#in-hp').value;
  if (!hpInput) return;

  const { data } = await supabase
    .from('orders')
    .select('*')
    .eq('hp', hpInput)
    .order('created_at', { ascending: false });

  const listRiwayat = $('#list-riwayat-saya');
  if (listRiwayat && data) {
    listRiwayat.innerHTML = data.map(o => `
      <div class="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center">
        <div>
          <p class="font-bold text-sm">${o.jemput} ➔ ${o.tujuan}</p>
          <p class="text-xs text-slate-500 capitalize">Status: ${o.status}</p>
        </div>
        <div class="text-xs font-bold ${o.status === 'selesai' ? 'text-green-600' : 'text-amber-600'}">
          ${o.status.toUpperCase()}
        </div>
      </div>
    `).join('') || '<p class="text-sm text-slate-400">Belum ada riwayat pesanan.</p>';
