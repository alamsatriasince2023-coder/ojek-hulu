<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ojek Hulu Putussibau</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <main class="max-w-xl mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Ojek Hulu</h1>
    
    <!-- Form Pesan -->
    <form id="form-pesan" class="bg-white p-4 rounded-2xl shadow-sm space-y-3">
      <input id="in-nama" placeholder="Nama Anda" class="w-full border p-2 rounded-xl" required>
      <input id="in-hp" placeholder="No HP" class="w-full border p-2 rounded-xl" required>
      <input id="in-jemput" placeholder="Titik Jemput" class="w-full border p-2 rounded-xl" required>
      <input id="in-tujuan" placeholder="Tujuan" class="w-full border p-2 rounded-xl" required>
      <button id="btn-pesan" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Pesan Sekarang</button>
    </form>

    <div class="flex gap-2 mb-6">
  <button onclick="switchMode('pelanggan')" class="flex-1 py-2 bg-slate-900 text-white rounded-xl">Mode Penumpang</button>
  <button onclick="switchMode('driver')" class="flex-1 py-2 bg-slate-200 rounded-xl">Mode Driver</button>
</div>

<div id="panel-pelanggan">
  <h2 class="font-bold mb-2">Pesan Ojek</h2>
  </div>

<div id="panel-driver" class="hidden">
  <h2 class="font-bold mb-2">Order Masuk</h2>
  <div id="drv-panel-order" class="space-y-3"></div>
</div>


    <div id="list-pesanan-saya" class="mt-4 space-y-2"></div>
    <div id="drv-panel-order" class="mt-4 space-y-2"></div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = "https://mrycbenqqpltlovtzgod.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeWNiZW5xcXBsdGxvdnR6Z29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzAxMTEsImV4cCI6MjA5NzgwNjExMX0.7wEMU_SioH4sGgBxfS8mPeweKjPwxWGC4gR6N7DQXmU";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const $ = (s) => document.querySelector(s);

    $('#form-pesan').addEventListener('submit', async (e) => {
      e.preventDefault();
      const { error } = await supabase.from('orders').insert([{
        nama: $('#in-nama').value,
        hp: $('#in-hp').value,
        jemput: $('#in-jemput').value,
        tujuan: $('#in-tujuan').value,
        status: 'baru'
      }]);
      if (!error) alert('Pesanan terkirim!');
    });

    async function render() {
      const { data } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
      if ($('#list-pesanan-saya')) {
        $('#list-pesanan-saya').innerHTML = data.map(o => `<div class="bg-white p-3 rounded-xl">${o.jemput} ➔ ${o.tujuan} (${o.status})</div>`).join('');
      }
    }

    supabase.channel('orders').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, render).subscribe();
    render();

    // Tambahkan di dalam <script type="module">
async function subscribeToOrders() {
  supabase
    .channel('realtime:orders')
    .on('postgres_changes', { 
      event: 'INSERT', 
      schema: 'public', 
      table: 'orders' 
    }, (payload) => {
      // payload.new berisi data pesanan yang baru saja masuk
      const order = payload.new;
      
      // Notifikasi browser (Penting agar driver sadar ada order)
      if (Notification.permission === "granted") {
        new Notification("Order Baru!", {
          body: `${order.nama} ingin jemput di ${order.jemput}`
        });
      }
      
      // Refresh tampilan list order untuk driver
      renderOrders(); 
    })
    .subscribe();
}

// Jalankan saat aplikasi dibuka
subscribeToOrders();

// Minta izin notifikasi saat tombol "Ambil Order" atau saat aplikasi pertama dibuka
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

async function renderOrders() {
  const { data } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
  
  // Ambil hanya order yang statusnya 'baru'
  const orderBaru = data.filter(o => o.status === 'baru');
  
  const drvPanel = $('#drv-panel-order');
  if (drvPanel) {
    drvPanel.innerHTML = orderBaru.map(o => `
      <div class="bg-yellow-50 border border-yellow-200 p-4 rounded-2xl shadow-md">
        <h3 class="font-bold text-lg">Order Baru!</h3>
        <p><b>Nama:</b> ${o.nama}</p>
        <p><b>Jemput:</b> ${o.jemput}</p>
        <p><b>Tujuan:</b> ${o.tujuan}</p>
        <button onclick="ambilOrder('${o.id}')" class="mt-3 w-full bg-green-600 text-white py-2 rounded-xl">Ambil Order</button>
      </div>
    `).join('');
  }
}

    // Fungsi Pindah Halaman
window.switchMode = (mode) => {
  if (mode === 'pelanggan') {
    $('#panel-pelanggan').classList.remove('hidden');
    $('#panel-driver').classList.add('hidden');
  } else {
    $('#panel-pelanggan').classList.add('hidden');
    $('#panel-driver').classList.remove('hidden');
    // Saat pindah ke driver, otomatis muat data
    renderDriverOrders();
  }
};

// Khusus Render Driver
async function renderDriverOrders() {
  const { data } = await supabase.from('orders').select('*').eq('status', 'baru').order('created_at', { ascending: false });
  
  const drvPanel = $('#drv-panel-order');
  if (drvPanel && data) {
    drvPanel.innerHTML = data.map(o => `
      <div class="bg-white p-4 rounded-2xl border shadow-sm">
        <div class="font-bold text-lg">${o.nama}</div>
        <div class="text-sm text-slate-600 mb-2">${o.jemput} ➔ ${o.tujuan}</div>
        <button onclick="handleUpdate('${o.id}', 'diambil')" class="w-full bg-green-600 text-white py-2 rounded-xl font-bold">Ambil Order</button>
      </div>
    `).join('') || '<p class="text-center text-slate-400">Tidak ada pesanan masuk.</p>';
  }
}



    
  </script>
</body>
</html>
